<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation of Experiment - 3</title>
    <style>
        /* Base Styles & Variables mimicking Tailwind */
        :root {
            --slate-50: #f8fafc;
            --slate-200: #e2e8f0;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-800);
            line-height: 1.5;
        }

        .main-wrapper {
            padding: 1.5rem;
            width: 100%;
        }

        .container {
            max-width: 72rem; /* 1152px */
            margin: 0 auto;
        }

        /* Header */
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--slate-200);
            letter-spacing: -0.025em;
        }

        /* Grid System */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .grid-layout {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Cards */
        .card {
            background-color: var(--white);
            border-radius: 0.75rem;
            border: 1px solid var(--slate-200);
            padding: 1.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.3s ease;
            height: 100%;
        }

        .card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card-content {
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            line-height: 1.375;
        }

        .highlight {
            color: var(--blue-600);
        }

        .formula-badge {
            display: inline-block;
            margin-top: 1rem;
            background-color: var(--blue-50);
            color: var(--blue-700);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid var(--blue-100);
            letter-spacing: 0.025em;
        }

        /* Buttons (Updated for <a> tags) */
        .card-actions {
            margin-top: auto; 
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .action-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--slate-700);
            background-color: var(--slate-50);
            border: 1px solid var(--slate-200);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none; /* Removes underline from links */
        }

        .arrow-icon {
            width: 1rem;
            height: 1rem;
            opacity: 0.4;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: var(--blue-600);
            color: var(--white);
            border-color: var(--blue-600);
        }

        .action-btn:hover .arrow-icon {
            opacity: 1;
            transform: translateX(4px);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <h2 class="page-title">Simulation of Experiment - 3</h2>

        <div class="grid-layout">
            
            <div class="card">
                <div class="card-content">
                    <h3 class="card-title">
                        Determination of <br>
                        <span class="highlight">Positive Sequence Reactance</span>
                    </h3>
                    <div class="formula-badge">X₁ = E / Iₛ꜀</div>
                </div>
                <div class="card-actions">
                    <a href="oc.html" class="action-btn">
                        <span>Open Circuit Test</span>
                        <svg class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                    <a href="sc.html" class="action-btn">
                        <span>Short Circuit Test</span>
                        <svg class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
            </div>

            <div class="card">
                <div class="card-content">
                    <h3 class="card-title">
                        Determination of <br>
                        <span class="highlight">Negative Sequence Reactance</span>
                    </h3>
                    <div class="formula-badge">X₂ = Vₒₛ / 3.Iₛₒ</div>
                </div>
                <div class="card-actions">
                    <a href="x2.html" class="action-btn">
                        <span>Simulation of X₂</span>
                        <svg class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
            </div>

            <div class="card">
                <div class="card-content">
                    <h3 class="card-title">
                        Determination of <br>
                        <span class="highlight">Zero Sequence Reactance</span>
                    </h3>
                    <div class="formula-badge">X₀ = 3.V₀ / I₀</div>
                </div>
                <div class="card-actions">
                    <a href="x0.html" class="action-btn">
                        <span>Simulation of X₀</span>
                        <svg class="arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="../assets/js/iframeResize.js"></script>
        
        </body>
</html>
